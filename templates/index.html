<!DOCTYPE html>
<html>
<head>
    <title>Deepfake Detection System</title>

    <!-- Particles -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        h1 {
    margin-top: 40px;
    font-size: 32px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #ff0033, #ff4d4d);

    /* ✅ Standard property (important) */
    background-clip: text;

    /* ✅ Webkit fallback */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    /* fallback */
    color: transparent;
}

        .container {
            margin-top: 40px;
            display: flex;
            justify-content: center;
        }

        .box {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 0 30px rgba(255, 0, 51, 0.3);
            border: 1px solid rgba(255, 0, 51, 0.3);
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.02);
            box-shadow: 0 0 50px rgba(255, 0, 51, 0.6);
        }

        input[type="file"] {
            margin: 20px 0;
            color: white;
        }

        button {
            background: linear-gradient(90deg, #ff0033, #ff4d4d);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #ff0033;
        }

        img {
            margin-top: 20px;
            width: 260px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }

        .result {
            font-size: 24px;
            margin-top: 20px;
            font-weight: bold;
        }

        .real {
            color: #00ff99;
        }

        .fake {
            color: #ff0033;
        }

        .confidence-bar {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 10px;
        }

        .confidence-fill {
            height: 10px;
            border-radius: 10px;
            background: linear-gradient(90deg, #00ff99, #00cc66);
            width: 0%;
        }

        footer {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>

<body>

<div id="particles-js"></div>

<h1>⚡ Deepfake Detection System ⚡</h1>

<div class="container">
    <div class="box">

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required onchange="previewImage(event)">
            <br>
            <button type="submit">Analyze Image</button>
        </form>

        <!-- Preview -->
        <img id="preview" style="display:none;"/>

        {% if image %}
            <img src="{{ image }}">
        {% endif %}

        {% if result %}
            <div class="result">
                Prediction:
                <span class="{{ 'real' if result == 'Real' else 'fake' }}">
                    {{ result }}
                </span>
            </div>

            <div style="margin-top:10px;">
                Confidence: {{ confidence }}
            </div>

            <!-- ✅ NO JINJA IN CSS -->
            <div class="confidence-bar">
                <div class="confidence-fill"
                     id="confidenceBar"
                     data-confidence="{{ confidence }}"></div>
            </div>
        {% endif %}

    </div>
</div>

<footer>
    AI Powered Deepfake Detection • Final Year Project
</footer>

<!-- Preview -->
<script>
function previewImage(event) {
    const img = document.getElementById('preview');
    img.src = URL.createObjectURL(event.target.files[0]);
    img.style.display = "block";
}
</script>

<!-- ✅ CLEAN JS (NO ERROR) -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    const bar = document.getElementById("confidenceBar");

    if (bar) {
        let confidence = parseFloat(bar.dataset.confidence || 0);
        let percent = Math.round(confidence * 100);
        bar.style.width = percent + "%";
    }
});
</script>

<!-- Particles -->
<script>
particlesJS("particles-js", {
  "particles": {
    "number": { "value": 60 },
    "color": { "value": "#ff0033" },
    "shape": { "type": "circle" },
    "opacity": { "value": 0.6 },
    "size": { "value": 3 },
    "move": { "enable": true, "speed": 2 }
  }
});
</script>

</body>
</html>
